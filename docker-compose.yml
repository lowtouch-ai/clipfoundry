services:
  website:
    build:
      context: ./src/website
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
    container_name: clipfoundry-website
    env_file:
      - ./src/website/.env.local
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.26
    container_name: clipfoundry-nginx
    ports:
      - "3070:80"
    volumes:
      - ./src/website/conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - website
    restart: unless-stopped
